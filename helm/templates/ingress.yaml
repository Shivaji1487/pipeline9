apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline9-ingress
  namespace: bank-production-v9
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: bank.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pipeline9-service
            port:
              number: 80