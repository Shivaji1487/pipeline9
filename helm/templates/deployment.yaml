apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline9-app
  namespace: bank-production-v9
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipeline9-app
  template:
    metadata:
      labels:
        app: pipeline9-app
    spec:
      containers:
      - name: python-backend
        image: sshivaji555/pipeline9-python-app:latest
        ports:
          - containerPort: 5000
        env:
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "admin123"